looky:
  survey:
    result-open-delay-hours: 24
  result-generation:
    fixed-delay: 60000
    max-attempts: 3
    narrative-model: gpt-5.4-mini
    image-model: gpt-image-2
    image-quality: low
    presigned-url-ttl: 24h
    s3:
      bucket: app-contents-dev
      region: ap-northeast-2

spring:
  datasource:
    url: jdbc:h2:mem:looky;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
