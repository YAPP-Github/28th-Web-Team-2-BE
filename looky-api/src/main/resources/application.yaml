looky:
  survey:
    result-open-delay-hours: 24
  result-generation:
    fixed-delay: 60000
    max-attempts: 3
    narrative-model: gpt-5.4-mini
    image-model: gpt-image-2
    image-quality: low
    presigned-url-ttl: 24h

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
